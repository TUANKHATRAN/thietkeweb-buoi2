<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Trang thông tin cá nhân</title>
		<meta charset = "utf-8">
		<link rel = "stylesheet" href = "../css/style2.css">
	</head>
	<body>
         <div class="container">
            <form id ="frmlogin">
              <h3>ĐĂNG NHẬP ZING ME</h3>
              <div class = "form-group">
                <label>Tên đăng nhập: </label>
                <input class = "form-control" type = "text" id = "txtUsername" name placeholder="Nhập tên đăng nhập">
              </div>
              <div class = "form-group">
                <label for = "txtPassword">Mật khẩu: </label>
                <input class = "form-control" type = "password" id = "txtPassword" name placeholder="Nhập mật khẩu">
              </div>
              <input type = "submit" name = "sbLogin" value ="Đăng nhập">
              <input type = "reset" name = "rsCancel" value = "hủy bỏ">
            </form>
         </div>
        </body>
</html>
