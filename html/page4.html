<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính tiền</title>
</head>
<body>

<table border="1">
    <tr>
        <th>STT</th>
        <th>Tên sản phẩm</th>
        <th>Số lượng</th>
        <th>Đơn giá</th>
        <th>Thành tiền</th>
    </tr>
    <tr>
        <td>1</td>
        <td>A</td>
        <td class="sl">3</td>
        <td class="dg">1000</td>
        <td class="tt"></td>
    </tr>
    <tr>
        <td>2</td>
        <td>B</td>
        <td class="sl">2</td>
        <td class="dg">2000</td>
        <td class="tt"></td>
    </tr>
    <tr>
        <td>3</td>
        <td>C</td>
        <td class="sl">4</td>
        <td class="dg">3000</td>
        <td class="tt"></td>
    </tr>
</table>
<br>
<button onclick="tinhTien()">Tính tiền</button>
<h3>Tổng thanh toán: <span id="TongThanhToan">0</span></h3>

<script>
function tinhTien() {
    let soLuongList = document.getElementsByClassName("sl");
    let donGiaList = document.getElementsByClassName("dg");
    let thanhTienList = document.getElementsByClassName("tt");

    let tong = 0;

for (let i = 0; i < soLuongList.length; i++) {
        let sl = parseInt(soLuongList[i].innerHTML);
        let dg = parseInt(donGiaList[i].innerHTML);

        let tt = sl * dg;

        thanhTienList[i].innerHTML = tt;

        tong += tt;
    }

    document.getElementById("TongThanhToan").innerHTML = tong;
}
</script>

</body>
</html>
